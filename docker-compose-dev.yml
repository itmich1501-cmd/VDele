services:
  postgres:
    container_name: postgres
    image: postgres:17
    restart: always
    environment:
      POSTGRES_DB: vdele_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "!Qq12345"
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  seq:
    container_name: seq
    image: datalust/seq:latest
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
    ports:
      - "8081:80"
      - "5341:5341"
    restart: always
    volumes:
      - seq_data:/data

  osnovanie-api:
    container_name: osnovanie-api
    build:
      context: .
      dockerfile: src/Osnovanie.Api/Dockerfile
    ports:
      - "9001:9001"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=http://+:9001
    env_file:
      - osnovanie.service.env

volumes:
  postgres_data:
  seq_data: